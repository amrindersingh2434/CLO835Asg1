apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: clo835-repo
  namespace: flux-system
spec:
  interval: 1m
  url: https://github.com/YOUR_GITHUB_USERNAME/YOUR_REPO_NAME
  ref:
    branch: main
---

apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: clo835-app
  namespace: flux-system
spec:
  interval: 1m
  path: "./k8s"
  prune: true
  sourceRef:
    kind: GitRepository
    name: clo835-repo
  targetNamespace: final
